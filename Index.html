<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pasangan Kata - Latihan 1</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Inter', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .quiz-header {
            background: #1e2a3e;
            padding: 1.2rem 2rem;
            color: white;
        }

        .quiz-header h1 {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.85rem;
            background: #0f1720;
            padding: 8px 16px;
            border-radius: 60px;
            width: fit-content;
            gap: 20px;
        }

        .stats span {
            font-weight: bold;
            color: #facc15;
        }

        .quiz-body {
            padding: 2rem;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 1.5rem;
            color: #0f172a;
            border-left: 5px solid #3b82f6;
            padding-left: 1rem;
        }

        .analogy-highlight {
            background: #f1f5f9;
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-family: monospace;
            font-weight: 700;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.2rem 0 1rem;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            padding: 0.85rem 1.2rem;
            font-size: 0.95rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-btn:hover:not(:disabled) {
            background: #f8fafc;
            border-color: #94a3b8;
            transform: scale(0.99);
        }

        .option-prefix {
            font-weight: 800;
            background: #f1f5f9;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }

        .option-btn.selected {
            background: #dbeafe;
            border-color: #3b82f6;
        }

        .feedback-message {
            margin-top: 1rem;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            background: #f1f5f9;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 24px 0 16px;
        }

        button {
            background: #334155;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            flex: 1;
        }

        .next-btn {
            background: #2563eb;
        }

        .submit-all-btn {
            background: #16a34a;
            box-shadow: 0 2px 6px rgba(22,163,74,0.3);
        }

        .reset-btn {
            background: #475569;
        }

        .result-area {
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 2px dashed #cbd5e1;
            text-align: center;
            font-weight: bold;
        }

        /* Summary Panel (semua jawaban) */
        .summary-panel {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            margin-top: 1rem;
            border: 1px solid #e2e8f0;
        }

        .answer-review-item {
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.85rem;
        }

        .answer-review-item.correct-review {
            background: #f0fdf4;
            margin: 4px 0;
            border-radius: 14px;
            padding: 8px 12px;
            border-left: 4px solid #22c55e;
        }

        .answer-review-item.wrong-review {
            background: #fef2f2;
            margin: 4px 0;
            border-radius: 14px;
            padding: 8px 12px;
            border-left: 4px solid #ef4444;
        }

        .score-big {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin: 15px 0;
            background: linear-gradient(135deg, #1e293b, #2d3e50);
            -webkit-background-clip: text;
            background-clip: text;
            color: #0f172a;
        }

        .back-btn {
            background: #3b82f6;
            margin-top: 12px;
        }

        @media (max-width: 550px) {
            .quiz-body { padding: 1.2rem; }
            .question-text { font-size: 1.2rem; }
        }
    </style>
    <script src="https://sql.js.org/dist/sql-wasm.js"></script>
</head>
<body>
<div class="quiz-container" id="quizRoot">
    <div class="quiz-header">
        <h1>📖 Pasangan Kata - Latihan 1</h1>
        <div class="stats">
            <div>📋 Soal: <span id="currentIdxDisplay">0</span> / <span id="totalCountSpan">0</span></div>
            <div>✅ Skor: <span id="scoreDisplay">0</span></div>
        </div>
    </div>
    <div class="quiz-body" id="dynamicContent">
        <div style="text-align:center; padding: 2rem;">Memuat database soal...</div>
    </div>
</div>

<script>
    // ==============================================================
    // DATA SOAL (25 item berdasarkan file)
    // ==============================================================
    const rawQuestions = [
        { stem: "_____ berhubungan dengan TULANG, sebagaimana GEDUNG berhubungan dengan _____", options: ["Belulang – ber-AC", "Tingkat – bertingkat", "Tua – kota", "Tubuh – rangka", "Kurus – kokoh"], correct: 1 },
        { stem: "_____ berhubungan dengan SISWA, sebagaimana DOSEN berhubungan dengan _____", options: ["Guru – perguruan tinggi", "Guru – kuliah", "Mahasiswa – guru", "Belajar – pengajar", "SMA - mahasiswa"], correct: 1 },
        { stem: "_____ berhubungan dengan KAPAL, sebagaimana PESAWAT UDARA berhubungan dengan _____", options: ["Angkatan laut – angkatan darat", "Pelaut – penerbang", "Prajurit – pilot", "Ikan – polusi", "Sungai – oksigen"], correct: 1 },
        { stem: "_____ berhubungan dengan CANGKIR, sebagaimana MAKANAN berhubungan dengan _____", options: ["Minuman – kue", "Minuman – piring", "Kaca – piring", "Pecah – basi", "Air – manis"], correct: 1 },
        { stem: "_____ berhubungan dengan ES, sebagaimana PELINDUNG berhubungan dengan _____", options: ["Salju – jaket", "Beku – panas", "Pendingin – payung", "Minuman – hujan", "Air – pengaman"], correct: 2 },
        { stem: "_____ berhubungan dengan STERIL, sebagaimana SUAMI berhubungan dengan _____", options: ["Bersih – meninggal", "Kuman – janda", "Rumah sakit – rumah tangga", "Kuman – meninggal", "Bakteri – istri"], correct: 4 },
        { stem: "_____ berkaitan dengan KETUA, sebagaimana PROVINSI berkaitan dengan _____", options: ["Bendahara – daerah istimewa", "Organisasi – gubernur", "Sekretaris – sekretaris daerah", "Anggota – rakyat", "Jabatan – kabupaten"], correct: 1 },
        { stem: "_____ berhubungan dengan EMAS, sebagaimana AYAH berhubungan dengan _____", options: ["Perunggu – anak", "Perak – kakek", "Berlian – paman", "Cincin – warisan", "Logam – keluarga"], correct: 1 },
        { stem: "_____ berhubungan dengan AKTOR, sebagaimana KOMANDAN berhubungan dengan _____", options: ["Film – pangkat", "Sutradara – prajurit", "Artis – pasukan", "Sutradara – batalion", "Film – senjata"], correct: 2 },
        { stem: "_____ berhubungan dengan RUMAH, sebagaimana KAPAS berhubungan dengan _____", options: ["Ruangan – pohon", "Kokoh – empuk", "Atap – tenun", "Batu bata – pakaian", "Cat – putih"], correct: 3 },
        { stem: "_____ berhubungan dengan PENYAKIT, sebagaimana BENTURAN berhubungan dengan _____", options: ["Virus – tulang", "Kuman – memar", "Kesehatan – luka", "Obat – otot", "Menderita – kecelakaan"], correct: 1 },
        { stem: "_____ berhubungan dengan SEPAKBOLA, sebagaimana BERBISIK berhubungan dengan _____", options: ["Kompetisi – suara", "Kiper – komunikasi", "Liga – berjalan", "Futsal – berbicara", "Lapangan – rasa takut"], correct: 1 },
        { stem: "_____ berhubungan dengan BASAH, sebagaimana MAKAN berhubungan dengan _____", options: ["Banjir – sehat", "Air – lapar", "Hujan – kenyang", "Dingin – minum", "Kering – makanan"], correct: 2 },
        { stem: "_____ berhubungan dengan KEPERCAYAAN, sebagaimana KESALAHAN berhubungan dengan _____", options: ["Kekuatan – kecerobohan", "Penghianatan – kesempurnaan", "Kebaikan – kelemahan", "Ketakutan – ketelitian", "Keyakinan – ketidakmampuan"], correct: 0 },
        { stem: "_____ berhubungan dengan KOKI, sebagaimana BUKU berhubungan dengan _____", options: ["Restoran – penerbit", "Makanan – perpustakaan", "Pisau – pelajar", "Dapur – penulis", "Rasa – penyunting"], correct: 3 },
        { stem: "_____ berhubungan dengan PENJAHIT, sebagaimana TANG berhubungan dengan _____", options: ["Kain – kerusakan", "Jarum – montir", "Gunting – obeng", "Mesin jahit – mobil", "Pakaian – perbaikan"], correct: 1 },
        { stem: "_____ berhubungan dengan DOMPET, sebagaimana BENANG berhubungan dengan _____", options: ["Wadah – jarum", "Kulit – kain", "Uang – pakaian", "Foto – sutra", "Uang – kapas"], correct: 2 },
        { stem: "_____ berhubungan dengan PENJAHAT sebagaimana KEBUN berhubungan dengan _____", options: ["Pengadilan – makanan", "Pencopet – buah", "Penjara – pupuk", "Hukuman – bumbu dapur", "Penjara – tanaman"], correct: 4 },
        { stem: "Peluit berhubungan dengan …, sebagaimana … berhubungan dengan prajurit.", options: ["wasit — senjata", "polisi — markas", "penalti — desersi", "permainan — perang", "kereta — pasukan"], correct: 0 },
        { stem: "Merdeka berhubungan dengan …, sebagaimana … berhubungan dengan penjara.", options: ["pahlawan — narapidana", "proklamasi — sidang", "penjajahan — kebebasan", "bebas — jeruji besi", "berontak — hukuman"], correct: 3 },
        { stem: "Gemetar berhubungan dengan sebagaimana … berhubungan dengan lucu.", options: ["lapar — geli", "sakit — lelucon", "gugup — parodi", "takut — tertawa", "bahaya — pelawak"], correct: 3 },
        { stem: "Senja berhubungan dengan …, sebagaimana … berhubungan dengan berlari.", options: ["malam — berjalan", "petang — kejar", "waktu — cepat", "siang — kaki", "bulan — berdiri"], correct: 0 },
        { stem: "Matematika berhubungan dengan …, sebagaimana … berhubungan dengan mobil.", options: ["matriks — transportasi", "rumus — jalan", "pelajaran — sedan", "angka — kendaraan", "hitungan — mesin"], correct: 3 },
        { stem: "Laptop berhubungan dengan …, sebagaimana … berhubungan dengan busana.", options: ["komputer — kaos", "printer — sandal", "telepon genggam — tali", "layar — kaos", "internet — semir"], correct: 0 },
        { stem: "Toko berhubungan dengan …, sebagaimana … berhubungan dengan ikan.", options: ["kasir — akuarium", "pembeli — cacing", "super market — paus", "makanan — pancing", "pakaian — bakar"], correct: 0 }
    ];

    // ==============================================================
    // STATE
    // ==============================================================
    let db = null;
    let currentQuestionIndex = 0;          // 0-based
    let userAnswers = new Array(rawQuestions.length).fill(null);
    let totalQuestions = rawQuestions.length;
    let showSummaryMode = false;            // mode tampilkan semua jawaban & skor

    const dynamicDiv = document.getElementById('dynamicContent');
    const currentIdxSpan = document.getElementById('currentIdxDisplay');
    const totalCountSpan = document.getElementById('totalCountSpan');
    const scoreSpan = document.getElementById('scoreDisplay');

    function computeScore() {
        let score = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === rawQuestions[i].correct) score++;
        }
        return score;
    }

    function updateStatsUI() {
        currentIdxSpan.innerText = currentQuestionIndex + 1;
        totalCountSpan.innerText = totalQuestions;
        scoreSpan.innerText = computeScore();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatStemWithBlanks(stem) {
        return stem.replace(/_____/g, '<span class="analogy-highlight">______</span>')
                   .replace(/…/g, '<span class="analogy-highlight">...</span>');
    }

    // =============== TAMPILKAN SEMUA JAWABAN + SKOR ===============
    function renderFullSummary() {
        const finalScore = computeScore();
        const answeredCount = userAnswers.filter(a => a !== null).length;
        let summaryHtml = `
            <div class="score-big">🎯 SKOR AKHIR: ${finalScore} / ${totalQuestions}</div>
            <div style="text-align:center; margin-bottom:16px;">📊 Soal terjawab: ${answeredCount} dari ${totalQuestions}</div>
            <div class="summary-panel">
                <div style="font-weight:bold; margin-bottom:12px;">📋 DAFTAR SEMUA JAWABAN & PEMBAHASAN:</div>
                <div id="answerReviewList" style="max-height: 450px; overflow-y: auto; padding-right: 6px;">
        `;
        for (let i = 0; i < rawQuestions.length; i++) {
            const q = rawQuestions[i];
            const userChoiceIdx = userAnswers[i];
            const isCorrect = (userChoiceIdx !== null && userChoiceIdx === q.correct);
            const userText = (userChoiceIdx !== null) ? q.options[userChoiceIdx] : "(Tidak dijawab)";
            const correctText = q.options[q.correct];
            const statusIcon = isCorrect ? "✅" : (userChoiceIdx !== null ? "❌" : "⚠️");
            let statusClass = (isCorrect ? "correct-review" : (userChoiceIdx !== null ? "wrong-review" : ""));
            summaryHtml += `
                <div class="answer-review-item ${statusClass}" style="margin-bottom: 10px;">
                    <div style="font-weight:600;">${i+1}. ${escapeHtml(q.stem)}</div>
                    <div style="font-size:0.85rem; margin-top:5px;">${statusIcon} <strong>Jawaban Anda:</strong> ${escapeHtml(userText)}</div>
                    <div style="font-size:0.85rem;"><strong>✔️ Jawaban benar:</strong> ${escapeHtml(correctText)}</div>
                    ${!isCorrect && userChoiceIdx !== null ? '<span style="font-size:0.75rem; color:#b91c1c;">✏️ Perhatikan analogi yang tepat.</span>' : ''}
                    ${userChoiceIdx === null ? '<span style="font-size:0.75rem; color:#92400e;">⚠️ Tidak dijawab</span>' : ''}
                </div>
            `;
        }
        summaryHtml += `
                </div>
                <button id="backToQuizBtn" class="back-btn" style="margin-top: 20px; width:100%;">⟳ Kembali ke Mode Kuis (Reset Jawaban)</button>
            </div>
        `;
        dynamicDiv.innerHTML = summaryHtml;
        const backBtn = document.getElementById('backToQuizBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                if (confirm('Reset semua jawaban dan kembali ke mode soal per soal?')) {
                    userAnswers.fill(null);
                    currentQuestionIndex = 0;
                    showSummaryMode = false;
                    updateStatsUI();
                    renderCurrentQuestionFromDB();
                }
            });
        }
    }

    // =============== RENDER SATU SOAL (mode normal) ===============
    function renderCurrentQuestionFromDB() {
        if (showSummaryMode) {
            renderFullSummary();
            return;
        }
        if (!db) return;
        const stmt = db.prepare("SELECT stem, opt_a, opt_b, opt_c, opt_d, opt_e, correct_idx FROM questions WHERE id = ?");
        stmt.bind([currentQuestionIndex + 1]);
        if (stmt.step()) {
            const row = stmt.getAsObject();
            const currentQ = {
                stem: row.stem,
                options: [row.opt_a, row.opt_b, row.opt_c, row.opt_d, row.opt_e],
                correct: row.correct_idx
            };
            renderSingleQuestionUI(currentQ);
        } else {
            dynamicDiv.innerHTML = "<div>Error memuat soal</div>";
        }
        stmt.free();
    }

    function renderSingleQuestionUI(q) {
        const currentAnswer = userAnswers[currentQuestionIndex];
        const isLocked = (currentAnswer !== null);
        const optionLetters = ['A', 'B', 'C', 'D', 'E'];
        let optionsHtml = '';
        for (let i = 0; i < q.options.length; i++) {
            let additionalClass = '';
            if (isLocked) {
                if (i === q.correct) additionalClass = 'correct-feedback';
                if (i === currentAnswer && i !== q.correct) additionalClass = 'wrong-feedback';
                if (i === currentAnswer) additionalClass += ' selected';
            } else {
                if (i === currentAnswer) additionalClass = 'selected';
            }
            optionsHtml += `
                <div class="option-btn ${additionalClass}" data-opt-index="${i}">
                    <span class="option-prefix">${optionLetters[i]}</span>
                    <span>${escapeHtml(q.options[i])}</span>
                </div>
            `;
        }

        let feedbackMsg = '';
        if (isLocked) {
            const isCorrect = (currentAnswer === q.correct);
            if (isCorrect) {
                feedbackMsg = `✅ Benar! Jawaban tepat: ${escapeHtml(q.options[q.correct])}.`;
            } else {
                feedbackMsg = `❌ Kurang tepat. Jawaban benar: ${escapeHtml(q.options[q.correct])}. Pilihan Anda: ${escapeHtml(q.options[currentAnswer])}.`;
            }
        } else {
            feedbackMsg = `💡 Pilih opsi yang paling tepat. Setelah menjawab, klik "SUBMIT & LIHAT SEMUA JAWABAN" untuk mengetahui skor akhir dan kunci jawaban.`;
        }

        const answeredCount = userAnswers.filter(a => a !== null).length;
        const allAnswered = (answeredCount === totalQuestions);
        
        const html = `
            <div class="question-text">
                ${formatStemWithBlanks(q.stem)}
            </div>
            <div class="options-grid" id="optionsGrid">
                ${optionsHtml}
            </div>
            <div class="feedback-message">
                ${feedbackMsg}
            </div>
            <div class="nav-buttons">
                <button id="prevBtn" ${currentQuestionIndex === 0 ? 'disabled' : ''}>◀ Sebelumnya</button>
                <button id="resetBtn" class="reset-btn">⟳ Reset Semua Jawaban</button>
                <button id="nextBtn" ${currentQuestionIndex === totalQuestions-1 ? '' : ''}>Berikutnya ▶</button>
            </div>
            <div class="result-area">
                📊 Progres: ${answeredCount}/${totalQuestions} soal terjawab | ✅ Skor sementara: ${computeScore()}
                ${allAnswered ? '<span style="color:#16a34a; margin-left:10px;">✔️ Lengkap! Klik submit untuk hasil final.</span>' : ''}
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button id="submitAllBtn" class="submit-all-btn">📬 SUBMIT & LIHAT SEMUA JAWABAN + SKOR AKHIR</button>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        
        // Event listener untuk pilihan jawaban (hanya jika belum terkunci)
        if (!isLocked) {
            const optButtons = document.querySelectorAll('.option-btn');
            optButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (userAnswers[currentQuestionIndex] !== null) return;
                    const selectedIdx = parseInt(btn.dataset.optIndex);
                    userAnswers[currentQuestionIndex] = selectedIdx;
                    updateStatsUI();
                    renderCurrentQuestionFromDB();
                });
            });
        }
        
        // Tombol navigasi
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn');
        const submitBtn = document.getElementById('submitAllBtn');
        
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    renderCurrentQuestionFromDB();
                    updateStatsUI();
                }
            });
        }
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (currentQuestionIndex < totalQuestions - 1) {
                    currentQuestionIndex++;
                    renderCurrentQuestionFromDB();
                    updateStatsUI();
                } else {
                    if (userAnswers[currentQuestionIndex] === null) {
                        alert("Silakan jawab soal terakhir terlebih dahulu, atau gunakan tombol SUBMIT untuk melihat hasil.");
                    }
                }
            });
        }
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                if (confirm('⚠️ Reset semua jawaban? Semua progres akan hilang.')) {
                    userAnswers.fill(null);
                    updateStatsUI();
                    renderCurrentQuestionFromDB();
                }
            });
        }
        if (submitBtn) {
            submitBtn.addEventListener('click', () => {
                const answered = userAnswers.filter(a => a !== null).length;
                if (answered < totalQuestions) {
                    if (!confirm(`Anda baru menjawab ${answered} dari ${totalQuestions} soal. Soal yang tidak dijawab akan dianggap salah. Tetap ingin melihat hasil akhir?`)) {
                        return;
                    }
                }
                // pindah ke mode ringkasan semua jawaban
                showSummaryMode = true;
                renderFullSummary();
            });
        }
    }

    // =============== INISIALISASI SQLITE ===============
    function initSQLiteAndRun() {
        window.initSqlJs({ locateFile: filename => `https://sql.js.org/dist/${filename}` })
            .then(SQL => {
                db = new SQL.Database();
                db.run(`CREATE TABLE questions (
                    id INTEGER PRIMARY KEY,
                    stem TEXT,
                    opt_a TEXT,
                    opt_b TEXT,
                    opt_c TEXT,
                    opt_d TEXT,
                    opt_e TEXT,
                    correct_idx INTEGER
                )`);
                const insert = db.prepare(`INSERT INTO questions VALUES (?,?,?,?,?,?,?,?)`);
                for (let i = 0; i < rawQuestions.length; i++) {
                    const q = rawQuestions[i];
                    insert.run([i+1, q.stem, q.options[0], q.options[1], q.options[2], q.options[3], q.options[4], q.correct]);
                }
                insert.free();
                updateStatsUI();
                renderCurrentQuestionFromDB();
            })
            .catch(err => {
                dynamicDiv.innerHTML = `<div style="color:red;">Gagal memuat database SQLite: ${err.message}</div>`;
            });
    }

    initSQLiteAndRun();
</script>
</body>
</html>
